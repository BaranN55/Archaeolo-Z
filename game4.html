<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 4</title>
    <link rel="stylesheet" href="game4.css">
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Next level background fade overlay -->
    <div id="next-bg-overlay"></div>

    <!-- Instruction text -->
    <div id="collect-hint">Click on these objects to collect them!</div>

    <!-- Collectible items -->
    <img src="../assets/dubaic.png"     class="collectible" id="item-dubaic"     data-id="dubaic"     alt="Budai Chocolate">
    <img src="../assets/ballerinac.png" class="collectible" id="item-ballerinac" data-id="ballerinac" alt="Ballerina Cappuccina">

    <!-- Collected flash message -->
    <div id="collect-flash"></div>

    <!-- Drill digging overlay (appears after buying drill) -->
    <div id="drill-overlay">
        <div id="drill-intro-text">Press Spacebar 5 times to drill deeper!</div>
        <img id="drill-img" src="../assets/drill1.png" alt="Drill">
    </div>

    <!-- "Need a drill" prompt -->
    <div id="need-tool-msg">You need a Drill to go deeper!<br>Buy one from the Tools page.</div>

    <script src="gamestate.js"></script>
    <script src="game4.js"></script>
    <script src="nav.js"></script>
    <script src="music.js"></script>
</body>
</html>
