<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Caesar+Dressing&display=swap" rel="stylesheet">
</head>
<body>
    <div class="Startcomponents">
        <h1>Archaeolo-Z</h1>
        <a href="game.html" class="Start-button" id="start-btn"></a>
        <a href="about.html" class="About-button" id="about-btn"></a>
        <a href="credits.html" class="Cred-button" id="cred-btn"></a>
    </div>

    <script>
        const clickSound = new Audio('../assets/clicksound.mp3');

        document.getElementById('start-btn').addEventListener('click', function(e) {
            e.preventDefault();
            clickSound.currentTime = 0;
            clickSound.play();
            localStorage.removeItem('coins');
            localStorage.removeItem('collected');
            localStorage.removeItem('sold');
            localStorage.removeItem('tools');
            sessionStorage.removeItem('music_pos');
            sessionStorage.removeItem('music_muted');
            setTimeout(() => { window.location.href = 'game.html'; }, 150);
        });

        document.getElementById('about-btn').addEventListener('click', function(e) {
            e.preventDefault();
            clickSound.currentTime = 0;
            clickSound.play();
            setTimeout(() => { window.location.href = 'about.html'; }, 150);
        });

        document.getElementById('cred-btn').addEventListener('click', function(e) {
            e.preventDefault();
            clickSound.currentTime = 0;
            clickSound.play();
            setTimeout(() => { window.location.href = 'credits.html'; }, 150);
        });
    </script>
    <script src="music.js"></script>
</body>
</html>
